services:
  postgres:
    image: postgres:15-alpine
    container_name: logistics_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shipgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shipgen"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./fastapi-app
      dockerfile: Dockerfile
    container_name: logistics_api
    environment:
      APP_NAME: ShipGen API (FastAPI)
      ENV: development
      DEBUG: "true"
      DB_CONNECTION: postgresql+psycopg2
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: shipgen
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_KEY: CHANGE_ME_SECRET
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      PORT: 9001
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ui:
    build:
      context: ./shipgen-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9001
    container_name: logistics_ui
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:
